name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - advanced
          - database
          - backend
          - visual
          - a11y
          - performance

concurrency:
  group: full-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HEADLESS: true
      CI: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium firefox webkit

      - name: Run Playwright smoke test
        if: ${{ inputs.suite == 'all' || inputs.suite == 'smoke' }}
        run: pytest tests/ui/playwright/test_playwright_smoke.py -m playwright -v --tb=short -n 1

      - name: Run Unit Tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run Smoke tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'smoke' }}
        run: pytest tests/ui/practice/ -m smoke --alluredir=allure-results || true

      - name: Run Advanced tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'advanced' }}
        run: pytest tests/ui/practice/ -m advanced --alluredir=allure-results || true

      - name: Run Database UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'database' }}
        run: pytest tests/backend/ -m database --alluredir=allure-results || true

      - name: Run Backend/API tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'backend' }}
        run: pytest tests/backend/ -m "api and not contract and not database" --alluredir=allure-results || true

      - name: Run Visual tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'visual' }}
        run: pytest tests/ui/visual/ -m visual --alluredir=allure-results || true

      - name: Run Accessibility tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'a11y' }}
        run: pytest tests/accessibility/ -m accessibility --alluredir=allure-results || true

      - name: Run Performance tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'performance' }}
        run: pytest tests/performance/ -m performance --alluredir=allure-results || true

      - name: Upload Allure results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/

      - name: Generate metrics summary.json
        if: always()
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_SUITE: ${{ inputs.suite }}
          ALLURE_RESULTS_DIR: allure-results
        run: node scripts/generate_summary_json.js

      - name: Upload summary.json to Cloudflare R2 (metrics)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp summary.json s3://qa-portfolio-metrics/${{ github.event.repository.name }}/${{ github.run_id }}.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          if-no-files-found: warn

      - name: Upload Report to Cloudflare R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync allure-report/ s3://qa-portfolio-allure/${{ github.event.repository.name }}/${{ github.run_id }}/ --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Add Report URL to Summary
        if: always()
        env:
          VAR_R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          SECRET_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          {
            echo "### Allure report"
            echo ""
            echo "GitHub **does not** expose artifact files at a browsable \`github.com/.../index.html\` URL (those links always 404)."
            echo "Use the **allure-report-${{ github.run_id }}** artifact: download, unzip, open \`index.html\` locally."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # NOTE: If R2_PUBLIC_URL is a *secret*, GitHub can mask it as `***` even in
          # Step Summary output, which breaks the link (it becomes relative and resolves
          # under github.com/actions/runs/...).
          #
          # Use repo variable `vars.R2_PUBLIC_URL` (not secret) for public domains.
          R2_PUBLIC_URL="${VAR_R2_PUBLIC_URL:-}"
          if [ -z "${R2_PUBLIC_URL:-}" ]; then
            R2_PUBLIC_URL="${SECRET_R2_PUBLIC_URL:-}"
          fi

          R2_PUBLIC_URL="$(echo "${R2_PUBLIC_URL:-}" | xargs)"
          R2_PUBLIC_URL="${R2_PUBLIC_URL%/}"
          if [ -n "$R2_PUBLIC_URL" ] && [[ ! "$R2_PUBLIC_URL" =~ ^https?:// ]]; then
            R2_PUBLIC_URL="https://${R2_PUBLIC_URL}"
          fi

          if [ -n "$R2_PUBLIC_URL" ] && [[ "$R2_PUBLIC_URL" != *"github.com"* ]] && [[ "$R2_PUBLIC_URL" != "***" ]]; then
            FINAL_URL="${R2_PUBLIC_URL}/${{ github.event.repository.name }}/${{ github.run_id }}/index.html"
            echo "Hosted copy (R2): [index.html](${FINAL_URL})" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$R2_PUBLIC_URL" ]; then
            echo "⚠️ Set **R2_PUBLIC_URL** as a **Repository Variable** (not secret) to avoid masking.\n- Go to **Settings → Secrets and variables → Actions → Variables**\n- Add **R2_PUBLIC_URL** = your public base (e.g. \`https://pub-....r2.dev\`)\n\nDo not use a \`github.com\` URL." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Optional: set **R2_PUBLIC_URL** to that public base URL to get a hosted link above." >> "$GITHUB_STEP_SUMMARY"
          fi
