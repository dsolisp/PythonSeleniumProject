name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - advanced
          - database
          - backend
          - pact
          - visual
          - a11y
          - performance

concurrency:
  group: full-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HEADLESS: true
      CI: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium firefox webkit

      - name: Run Unit Tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run Smoke tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'smoke' }}
        run: pytest tests/web/ -m smoke --alluredir=allure-results || true

      - name: Run Advanced tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'advanced' }}
        run: pytest tests/web/ -m advanced --alluredir=allure-results || true

      - name: Run Database UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'database' }}
        run: pytest tests/web/ -m database --alluredir=allure-results || true

      - name: Run Backend/API tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'backend' }}
        run: pytest tests/api/ tests/backend/ --alluredir=allure-results || true

      - name: Run Pact consumer tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'pact' }}
        run: pytest tests/pact/ -m pact -n 0 -v --tb=short

      - name: Publish Pact contracts to PactFlow
        if: ${{ (inputs.suite == 'all' || inputs.suite == 'pact') && env.PACT_BROKER_BASE_URL != '' && env.PACT_BROKER_TOKEN != '' }}
        uses: pactflow/actions/publish-pact-files@v2
        with:
          pactfiles: pacts
          broker_url: ${{ env.PACT_BROKER_BASE_URL }}
          token: ${{ env.PACT_BROKER_TOKEN }}
          version: ${{ github.sha }}
          branch: ${{ github.ref_name }}

      - name: Run Visual tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'visual' }}
        run: pytest tests/ui/visual/ -m visual --alluredir=allure-results || true

      - name: Run Accessibility tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'a11y' }}
        run: pytest tests/ui/accessibility/ -m a11y --alluredir=allure-results || true

      - name: Run Performance tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'performance' }}
        run: pytest tests/performance/ -m performance --alluredir=allure-results || true

      - name: Upload Allure results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/

      - name: Generate metrics summary.json
        if: always()
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_SUITE: ${{ inputs.suite }}
          ALLURE_RESULTS_DIR: allure-results
        run: node scripts/generate_summary_json.js

      - name: Upload summary.json to Cloudflare R2 (metrics)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp summary.json s3://qa-portfolio-metrics/${{ github.event.repository.name }}/${{ github.run_id }}.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          if-no-files-found: warn

      - name: Upload Report to Cloudflare R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync allure-report/ s3://qa-portfolio-allure/${{ github.event.repository.name }}/${{ github.run_id }}/ --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Add Report URL to Summary
        if: always()
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          {
            echo "### Allure report"
            echo ""
            echo "GitHub **does not** expose artifact files at a browsable \`github.com/.../index.html\` URL (those links always 404)."
            echo "Use the **allure-report-${{ github.run_id }}** artifact: download, unzip, open \`index.html\` locally."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$R2_PUBLIC_URL" ] && [[ "$R2_PUBLIC_URL" != *"github.com"* ]]; then
            echo "Hosted copy (R2): [index.html](${R2_PUBLIC_URL}/${{ github.event.repository.name }}/${{ github.run_id }}/index.html)" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$R2_PUBLIC_URL" ]; then
            echo "⚠️ **R2_PUBLIC_URL** must be the **public** base URL for bucket \`qa-portfolio-allure\` (R2 custom domain or \`*.r2.dev\`), not a \`github.com\` link. Fix it under **Settings → Secrets and variables**." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Optional: set **R2_PUBLIC_URL** to that public base URL to get a hosted link above." >> "$GITHUB_STEP_SUMMARY"
          fi
